allow-lan: true
mode: rule
timeout: 20
external-controller: 127.0.0.1:9090

# 体验与性能（Mihomo 常用优化）
unified-delay: true
tcp-concurrent: true
profile:
  store-selected: true
  store-fake-ip: true

dns:
  enable: true
  ipv6: true
  enhanced-mode: fake-ip
  use-hosts: true

  # 系统启动/DoH 不通时的兜底（纯 IP）
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # 默认（偏国内）
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 114.114.114.114

  # 代理链路下解析（海外质量更好）
  proxy-server-nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query

  # 核心优化：按 geosite 分流 DNS（CN -> 国内；非 CN -> 国外 DoH）
  nameserver-policy:
    "geosite:cn":
      - 223.5.5.5
      - 119.29.29.29
      - 114.114.114.114
    "geosite:geolocation-!cn":
      - https://1.1.1.1/dns-query
      - https://8.8.8.8/dns-query

