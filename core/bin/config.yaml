allow-lan: false
dns:
    default-nameserver:
        - 223.5.5.5
        - 114.114.114.114
    enable: true
    enhanced-mode: fake-ip
    fake-ip-filter:
        - '*.lan'
        - '*.localdomain'
        - '*.example'
        - '*.invalid'
        - '*.localhost'
        - '*.test'
        - lan
        - localdomain
        - localhost
    fake-ip-range: 198.18.0.1/16
    fallback:
        - https://doh.dns.sb/dns-query
        - https://dns.cloudflare.com/dns-query
    ipv6: false
    nameserver:
        - 119.29.29.29
        - 223.5.5.5
    nameserver-policy:
        geosite:cn: https://doh.pub/dns-query
    proxy-server-nameserver:
        - https://doh.pub/dns-query
    use-hosts: true
    use-system-hosts: true
external-controller: 127.0.0.1:9090
log-level: info
mixed-port: 7890
mode: rule
proxies:
    - name: Laxgo
      network: ws
      port: 443
      server: laxgo.zhzz.us.ci
      servername: laxgo.zhzz.us.ci
      skip-cert-verify: false
      tls: true
      type: vless
      udp: true
      uuid: e77f526d-f03e-416d-8856-fb6b511c7eeb
      ws-opts:
        headers:
            Host: laxgo.zhzz.us.ci
        path: /ws
proxy-groups:
    - name: PROXY
      proxies:
        - Laxgo
      type: select
rules:
    - MATCH,PROXY
tun:
    auto-detect-interface: true
    auto-route: true
    dns-hijack:
        - any:53
    enable: false
    mtu: 1500
    stack: gvisor
    strict-route: true
