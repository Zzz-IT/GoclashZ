proxy-groups:
  # 统一入口：默认建议选 AUTO；也可手动切到某地区/某单节点
  - name: PROXY
    type: select
    proxies:
      - AUTO
      - US
      - UK
      - DE
      - US_Hypia
      - US_Usargo
      - US2_Laxgo
      - UK_Ukone
      - UK_Kingweb
      - DE_Delake
      - DE_Dargo

  # 全局择优：只测“地区容灾组”，避免把所有节点都拿去测导致开销大
  - name: AUTO
    type: url-test
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 150
    proxies:
      - US
      - UK
      - DE

  # 地区容灾（你的原设计保留）
  - name: US
    type: fallback
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    proxies:
      - US_Hypia
      - US_Usargo
      - US2_Laxgo
  
  - name: UK
    type: fallback
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    proxies:
      - UK_Ukone
      - UK_Kingweb  

  - name: DE
    type: fallback
    url: http://cp.cloudflare.com/generate_204
    interval: 300
    proxies:
      - DE_Delake
      - DE_Dargo
