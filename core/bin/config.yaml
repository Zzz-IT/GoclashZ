mixed-port: 7890
allow-lan: false
mode: rule
log-level: info
external-controller: 127.0.0.1:9090  # 👉 新增这一行！
proxies:
    - name: Laxgo
      network: ws
      port: 443
      server: laxgo.zhzz.us.ci
      servername: laxgo.zhzz.us.ci
      skip-cert-verify: false
      tls: true
      type: vless
      udp: true
      uuid: e77f526d-f03e-416d-8856-fb6b511c7eeb
      ws-opts:
        headers:
            Host: laxgo.zhzz.us.ci
        path: /ws
proxy-groups:
    - name: PROXY
      proxies:
        - Laxgo
      type: select
rules:
    - MATCH,PROXY